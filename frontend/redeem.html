<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分兑换 - LoyaltyLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="redeem">
    <header class="nav-bar">
      <div class="nav-title">LoyaltyLink</div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link" data-page="index">首页</a>
        <a href="shop.html" class="nav-link" data-page="shop">商城</a>
        <a href="redeem.html" class="nav-link" data-page="redeem">兑换</a>
        <a href="merchant.html" class="nav-link" data-page="merchant">商家</a>
        <a href="history.html" class="nav-link" data-page="history">记录</a>
        <a href="admin.html" class="nav-link" data-page="admin">管理</a>
      </nav>
    </header>

    <div class="container">
        <h1>积分兑换商城</h1>

        <button id="connectBtn">连接 MetaMask</button>

        <div id="account">账户: 未连接</div>
        <div id="tokenInfo">代币: 未加载</div>
        <div id="balance">LYL 余额: 0</div>
        <div id="ethBalance">ETH 余额: 0</div>

        <div id="status"></div>

        <section class="section">
            <h2>可兑换奖品</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 8px;">
                使用 LYL 积分兑换优惠券和实物奖品。兑换将调用合约 spend() 销毁积分。
            </p>
            <div id="redeem-list" class="product-grid">
                <!-- JS 动态填充 -->
            </div>
        </section>

        <section class="section">
            <h2>我的兑换记录</h2>
            <div id="my-redemptions">
                <p class="hint">暂无兑换记录</p>
            </div>
        </section>
    </div>

    <!-- 确认兑换对话框 -->
    <div id="confirm-dialog" class="dialog-overlay">
        <div class="dialog-box">
            <h3>确认兑换</h3>
            <p id="confirm-text"></p>
            <p style="color: #888; font-size: 0.85rem;">确认后将在 MetaMask 中发起交易</p>
            <div class="dialog-buttons">
                <button class="button-secondary" id="btn-cancel-dialog">取消</button>
                <button id="btn-confirm-dialog">确认兑换</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/redeem.js"></script>
</body>
</html>
