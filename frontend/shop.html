<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分商城 - LoyaltyLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="shop">
    <header class="nav-bar">
      <div class="nav-title">LoyaltyLink</div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link" data-page="index">首页</a>
        <a href="shop.html" class="nav-link" data-page="shop">商城</a>
        <a href="redeem.html" class="nav-link" data-page="redeem">兑换</a>
        <a href="merchant.html" class="nav-link" data-page="merchant">商家</a>
        <a href="history.html" class="nav-link" data-page="history">记录</a>
        <a href="admin.html" class="nav-link" data-page="admin">管理</a>
      </nav>
    </header>

    <div class="container">
        <h1>联盟商家积分商城</h1>

        <button id="connectBtn">连接 MetaMask</button>

        <div id="account">账户: 未连接</div>
        <div id="tokenInfo">代币: 未加载</div>
        <div id="balance">LYL 余额: 0</div>
        <div id="ethBalance">ETH 余额: 0</div>

        <div id="status"></div>

        <section class="section">
            <h2>商品列表</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 8px;">
                浏览联盟商家商品，选择后下单。1 元消费 = 1 LYL 积分。订单提交后由商家确认并发放积分。
            </p>
            <div id="product-list" class="product-grid">
                <!-- JS 动态填充 -->
            </div>
        </section>

        <section class="section">
            <h2>我的订单</h2>
            <div id="my-orders">
                <p class="hint">暂无订单</p>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
