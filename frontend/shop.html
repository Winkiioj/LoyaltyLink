<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商城 - LoyaltyLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="shop">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">LoyaltyLink</div>
            <div class="brand-sub">Decentralized Loyalty</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link" data-page="index"><span class="nav-icon">&#9673;</span>首页</a>
            <a href="shop.html" class="sidebar-link active" data-page="shop"><span class="nav-icon">&#9702;</span>商城</a>
            <a href="redeem.html" class="sidebar-link" data-page="redeem"><span class="nav-icon">&#9730;</span>积分兑换</a>
            <a href="merchant.html" class="sidebar-link" data-page="merchant"><span class="nav-icon">&#9743;</span>商家管理</a>
            <a href="history.html" class="sidebar-link" data-page="history"><span class="nav-icon">&#9776;</span>交易记录</a>
            <a href="admin.html" class="sidebar-link" data-page="admin"><span class="nav-icon">&#9733;</span>管理后台</a>
        </nav>
        <div class="sidebar-footer">ERC-20 &middot; Ganache</div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1 class="page-title">联盟商家商城</h1>
            <button id="connectBtn" class="btn-connect">连接 MetaMask</button>
        </div>

        <div class="info-strip">
            <div class="info-card"><div class="info-label">账户</div><div class="info-value" id="account">未连接</div></div>
            <div class="info-card"><div class="info-label">合约</div><div class="info-value" id="tokenInfo">未加载</div></div>
            <div class="info-card"><div class="info-label">LYL 余额</div><div class="info-value" id="balance">0</div></div>
            <div class="info-card"><div class="info-label">ETH 余额</div><div class="info-value" id="ethBalance">0</div></div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                    商品列表
                    <select id="shop-merchant-filter" onchange="renderProducts()" style="width:auto;font-size:0.8rem;">
                        <option value="all">全部商家</option>
                    </select>
                </div>
                <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:12px;">订单提交后由商家确认并发放积分。</p>
                <div id="product-list" class="product-grid"></div>
            </div>
            <div class="panel">
                <div class="panel-header">我的订单</div>
                <div id="my-orders"><p class="hint">暂无订单</p></div>
            </div>
        </div>

        <div id="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
