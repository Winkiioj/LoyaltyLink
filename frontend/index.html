<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyLink - 用户端</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>LoyaltyLink 钱包</h1>

        <!-- 连接钱包 -->
        <button id="connectBtn">连接 MetaMask</button>
        <div id="account">账户: 未连接</div>
        <div id="balance">余额: 0 ETH</div>

        <hr>

        <!-- 转账 ETH -->
        <h3>转账 ETH</h3>
        <input type="text" id="toAddress" placeholder="接收地址 (0x...)">
        <input type="number" id="transferAmount" placeholder="ETH 数量" step="0.001" min="0.001">
        <button id="transferBtn">转账</button>

        <!-- 状态提示 -->
        <div id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
