<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyLink - 用户端</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎁 LoyaltyLink 积分钱包</h1>
        
        <!-- 连接钱包 -->
        <button id="connectBtn">连接 MetaMask</button>
        <div id="account">账户: 未连接</div>
        <div id="balance">余额: 0 LYL</div>
        
        <hr>
        
        <!-- 转账功能 -->
        <h3>💸 转账</h3>
        <input type="text" id="toAddress" placeholder="接收地址 (0x...)">
        <input type="number" id="transferAmount" placeholder="数量" min="1">
        <button id="transferBtn">转账</button>
        
        <!-- 状态提示 -->
        <div id="status"></div>
    </div>

    <!-- Web3.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <!-- ABI 文件（由成员3提供后更新） -->
    <!-- <script src="abi.json"></script> -->
    <script src="app.js"></script>
</body>
</html>
