<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyLink - 用户端</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>LoyaltyLink 用户端</h1>

        <button id="connectBtn">连接 MetaMask</button>

        <div id="account">账户: 未连接</div>
        <div id="tokenInfo">代币: 未加载</div>
        <div id="balance">LYL 余额: 0</div>
        <div id="ethBalance">ETH 余额: 0</div>

        <hr>

        <h3>转账 LYL 积分</h3>
        <input type="text" id="toAddress" placeholder="接收地址 (0x...)">
        <input type="number" id="transferAmount" placeholder="LYL 数量" step="1" min="1">
        <button id="transferBtn">转账 LYL</button>

        <div id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
