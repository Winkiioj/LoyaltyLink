<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - LoyaltyLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="index">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">LoyaltyLink</div>
            <div class="brand-sub">Decentralized Loyalty</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link active" data-page="index"><span class="nav-icon">&#9673;</span>首页</a>
            <a href="shop.html" class="sidebar-link" data-page="shop"><span class="nav-icon">&#9702;</span>商城</a>
            <a href="redeem.html" class="sidebar-link" data-page="redeem"><span class="nav-icon">&#9730;</span>积分兑换</a>
            <a href="merchant.html" class="sidebar-link" data-page="merchant"><span class="nav-icon">&#9743;</span>商家管理</a>
            <a href="history.html" class="sidebar-link" data-page="history"><span class="nav-icon">&#9776;</span>交易记录</a>
            <a href="admin.html" class="sidebar-link" data-page="admin"><span class="nav-icon">&#9733;</span>管理后台</a>
        </nav>
        <div class="sidebar-footer">ERC-20 &middot; Ganache</div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1 class="page-title">首页</h1>
            <button id="connectBtn" class="btn-connect">连接 MetaMask</button>
        </div>

        <div class="info-strip">
            <div class="info-card"><div class="info-label">账户</div><div class="info-value" id="account">未连接</div></div>
            <div class="info-card"><div class="info-label">合约</div><div class="info-value" id="tokenInfo">未加载</div></div>
            <div class="info-card"><div class="info-label">LYL 余额</div><div class="info-value" id="balance">0</div></div>
            <div class="info-card"><div class="info-label">ETH 余额</div><div class="info-value" id="ethBalance">0</div></div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <div class="panel-header">转账 LYL 积分</div>
                <input type="text" id="toAddress" placeholder="接收地址 (0x...)"><span class="field-error"></span>
                <input type="number" id="transferAmount" placeholder="LYL 数量" step="1" min="1"><span class="field-error"></span>
                <button id="transferBtn">确认转账</button>
            </div>
            <div class="panel" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:0.85rem;">
                连接钱包后，可在此向联盟内任意用户转账 LYL 积分。
            </div>
        </div>

        <div id="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="js/common.js"></script>
    <script src="app.js"></script>
</body>
</html>
