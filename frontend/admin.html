<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - LoyaltyLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">LoyaltyLink</div>
            <div class="brand-sub">Decentralized Loyalty</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link" data-page="index"><span class="nav-icon">&#9673;</span>首页</a>
            <a href="shop.html" class="sidebar-link" data-page="shop"><span class="nav-icon">&#9702;</span>商城</a>
            <a href="redeem.html" class="sidebar-link" data-page="redeem"><span class="nav-icon">&#9730;</span>积分兑换</a>
            <a href="merchant.html" class="sidebar-link" data-page="merchant"><span class="nav-icon">&#9743;</span>商家管理</a>
            <a href="history.html" class="sidebar-link" data-page="history"><span class="nav-icon">&#9776;</span>交易记录</a>
            <a href="admin.html" class="sidebar-link active" data-page="admin"><span class="nav-icon">&#9733;</span>管理后台</a>
        </nav>
        <div class="sidebar-footer">ERC-20 &middot; Ganache</div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1 class="page-title">管理后台</h1>
            <div class="btn-group" style="width:auto;">
                <button id="connectBtn" class="btn-connect">连接 MetaMask</button>
                <button id="refreshBtn" class="btn-connect btn-secondary">刷新</button>
            </div>
        </div>

        <div class="info-strip">
            <div class="info-card"><div class="info-label">账户</div><div class="info-value" id="account">未连接</div></div>
            <div class="info-card"><div class="info-label">Owner</div><div class="info-value" id="ownerInfo">未加载</div></div>
            <div class="info-card"><div class="info-label">管理员状态</div><div class="info-value" id="adminStatus">未查询</div></div>
            <div class="info-card"><div class="info-label">合约</div><div class="info-value" id="tokenInfo">未加载</div></div>
            <div class="info-card"><div class="info-label">ETH 余额</div><div class="info-value" id="ethBalance">0</div></div>
        </div>

        <!-- 两栏 -->
        <div class="content-grid">
            <!-- 商家管理 -->
            <div class="panel">
                <div class="panel-header">商家管理</div>
                <h3>添加商家</h3>
                <input type="text" id="addMerchantAddress" placeholder="商家地址"><span class="field-error"></span>
                <input type="text" id="addMerchantName" placeholder="商家名称（选填）"><span class="field-error"></span>
                <button id="addMerchantBtn">添加商家</button>
                <hr>
                <h3>移除商家</h3>
                <input type="text" id="removeMerchantAddress" placeholder="商家地址"><span class="field-error"></span>
                <button id="removeMerchantBtn">移除商家</button>
                <hr>
                <h3>查询商家</h3>
                <input type="text" id="checkMerchantAddress" placeholder="查询地址"><span class="field-error"></span>
                <button id="checkMerchantBtn">查询</button>
                <div id="checkMerchantResult">-</div>
            </div>

            <!-- 白名单 + 暂停 -->
            <div class="panel">
                <div class="panel-header">当前商家白名单</div>
                <div id="merchantList" style="max-height:200px;overflow-y:auto;">暂无数据</div>
                <hr>
                <div class="panel-header">紧急控制</div>
                <p style="color:var(--text-muted);font-size:0.78rem;margin-bottom:8px;">暂停后 reward/spend/transfer/redeem 均不可用</p>
                <div class="btn-group">
                    <button id="pauseBtn">暂停合约</button>
                    <button id="unpauseBtn" class="btn-secondary">恢复合约</button>
                </div>
                <div id="pauseStatus" style="margin-top:8px;">-</div>
            </div>
        </div>

        <div id="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="js/common.js"></script>
    <script src="admin.js"></script>
</body>
</html>
