<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyLink - 商户端</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>LoyaltyLink 商户管理</h1>

        <!-- 连接钱包 -->
        <button id="connectBtn">连接 MetaMask</button>
        <div id="account">账户: 未连接</div>
        <div id="balance">余额: 0 ETH</div>

        <hr>

        <!-- 商家收款地址 -->
        <div id="merchantAddress" style="display:none;text-align:center;padding:8px;background:#e8f4fd;border-radius:8px;word-break:break-all;"></div>

        <!-- 发放 ETH（原 reward） -->
        <h3>发放 ETH</h3>
        <input type="text" id="rewardAddress" placeholder="用户地址 (0x...)">
        <input type="number" id="rewardAmount" placeholder="ETH 数量" step="0.001" min="0.001">
        <button id="rewardBtn">发放 ETH</button>

        <hr>

        <!-- 扣款（原 spend） -->
        <h3>扣款</h3>
        <input type="text" id="chargeAddress" placeholder="用户地址 (0x...)">
        <input type="number" id="chargeAmount" placeholder="ETH 数量" step="0.001" min="0.001">
        <button id="chargeBtn">生成扣款请求</button>
        <div id="chargeInfo" style="display:none;margin-top:12px;padding:12px;background:#fff3cd;border-radius:8px;font-size:0.9rem;"></div>

        <!-- 状态提示 -->
        <div id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="merchant.js"></script>
</body>
</html>
