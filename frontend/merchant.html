<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoyaltyLink - 商家端</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>LoyaltyLink 商家端</h1>

        <button id="connectBtn">连接 MetaMask</button>

        <div id="account">账户: 未连接</div>
        <div id="tokenInfo">代币: 未加载</div>
        <div id="merchantStatus">商家状态: 未查询</div>
        <div id="balance">LYL 余额: 0</div>
        <div id="ethBalance">ETH 余额: 0</div>

        <hr>

        <h3>发放 LYL 积分</h3>
        <input type="text" id="rewardAddress" placeholder="用户地址 (0x...)">
        <input type="number" id="rewardAmount" placeholder="LYL 数量" step="1" min="1">
        <button id="rewardBtn">发放 LYL</button>

        <hr>

        <h3>扣除 LYL 积分</h3>
        <input type="text" id="spendAddress" placeholder="用户地址 (0x...)">
        <input type="number" id="spendAmount" placeholder="LYL 数量" step="1" min="1">
        <button id="spendBtn">扣除 LYL</button>

        <hr>

        <h3>查询任意地址积分余额</h3>
        <input type="text" id="queryAddress" placeholder="查询地址 (0x...)">
        <button id="queryBtn">查询余额</button>
        <div id="queryResult">查询结果: -</div>

        <div id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="merchant.js"></script>
</body>
</html>
