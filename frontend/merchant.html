<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家管理 - LoyaltyLink</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .content-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
        @media (max-width: 1100px) { .content-grid.cols3 { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .content-grid.cols3 { grid-template-columns: 1fr; } }
        .scroll-list { max-height: 140px; overflow-y: auto; }
        .form-compact input { padding: 6px 9px; font-size: 0.8rem; margin: 2px 0; }
        .form-compact button { padding: 6px 10px; font-size: 0.8rem; margin: 2px 0; }
        .form-compact hr { margin: 10px 0; }
        .form-row { display: flex; gap: 8px; }
        .form-row input { flex: 1; }
        .product-list-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); margin-bottom: 4px; font-size: 0.8rem; }
        .product-list-item .p-name { flex: 1; font-weight: 500; }
        .product-list-item .p-price { color: var(--text-secondary); white-space: nowrap; }
        .product-list-item .p-del { color: var(--pastel-red-text); cursor: pointer; font-size: 0.85rem; padding: 2px 6px; border: none; background: none; }
        .product-list-item .p-del:hover { text-decoration: underline; }
    </style>
</head>
<body data-page="merchant">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">LoyaltyLink</div>
            <div class="brand-sub">Decentralized Loyalty</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link" data-page="index"><span class="nav-icon">&#9673;</span>首页</a>
            <a href="shop.html" class="sidebar-link" data-page="shop"><span class="nav-icon">&#9702;</span>商城</a>
            <a href="redeem.html" class="sidebar-link" data-page="redeem"><span class="nav-icon">&#9730;</span>积分兑换</a>
            <a href="merchant.html" class="sidebar-link active" data-page="merchant"><span class="nav-icon">&#9743;</span>商家管理</a>
            <a href="history.html" class="sidebar-link" data-page="history"><span class="nav-icon">&#9776;</span>交易记录</a>
            <a href="admin.html" class="sidebar-link" data-page="admin"><span class="nav-icon">&#9733;</span>管理后台</a>
        </nav>
        <div class="sidebar-footer">ERC-20 &middot; Ganache</div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1 class="page-title">商家管理</h1>
            <button id="connectBtn" class="btn-connect">连接 MetaMask</button>
        </div>

        <div class="info-strip">
            <div class="info-card"><div class="info-label">商家状态</div><div class="info-value" id="merchantStatus">未查询</div></div>
            <div class="info-card"><div class="info-label">LYL 余额</div><div class="info-value" id="balance">0</div></div>
            <div class="info-card"><div class="info-label">ETH 余额</div><div class="info-value" id="ethBalance">0</div></div>
            <div class="info-card"><div class="info-label">账户</div><div class="info-value" id="account" style="font-size:0.78rem;">未连接</div></div>
        </div>

        <!-- 三栏布局 -->
        <div class="content-grid cols3">
            <div class="panel">
                <div class="panel-header">待处理订单</div>
                <div class="scroll-list" id="pending-orders"><p class="hint">暂无</p></div>
            </div>

            <div class="panel form-compact">
                <div class="panel-header">发放 / 扣除积分</div>
                <input type="text" id="rewardAddress" placeholder="用户地址"><span class="field-error"></span>
                <input type="number" id="rewardAmount" placeholder="LYL 数量" step="1" min="1"><span class="field-error"></span>
                <button id="rewardBtn">发放 LYL</button>
                <hr>
                <input type="text" id="spendAddress" placeholder="用户地址"><span class="field-error"></span>
                <input type="number" id="spendAmount" placeholder="LYL 数量" step="1" min="1"><span class="field-error"></span>
                <button id="spendBtn">扣除 LYL</button>
            </div>

            <div class="panel form-compact">
                <div class="panel-header">查询余额</div>
                <input type="text" id="queryAddress" placeholder="查询地址"><span class="field-error"></span>
                <button id="queryBtn">查询</button>
                <div id="queryResult" style="margin-top:4px;">-</div>
                <hr>
                <div class="panel-header">兑换请求</div>
                <div class="scroll-list" id="redemption-requests"><p class="hint">暂无</p></div>
            </div>
        </div>

        <!-- 商品管理（全宽）-->
        <div class="panel form-compact">
            <div class="panel-header">我的商品（将显示在商城）</div>
            <div class="form-row">
                <input type="text" id="productName" placeholder="商品名称，如：美式咖啡">
                <input type="number" id="productPrice" placeholder="价格 (元)" min="1" step="1" style="max-width:100px;">
                <input type="number" id="productPoints" placeholder="发放 LYL" min="1" step="1" style="max-width:100px;">
                <input type="text" id="productIcon" placeholder="图标 (emoji)" style="max-width:80px;" value="🛍️">
                <button id="addProductBtn" style="width:auto;white-space:nowrap;">添加商品</button>
            </div>
            <div class="scroll-list" id="my-products" style="margin-top:8px;max-height:100px;"><p class="hint">尚未添加自定义商品</p></div>
        </div>

        <!-- 兑换奖品管理（全宽）-->
        <div class="panel form-compact">
            <div class="panel-header">我的兑换奖品（将显示在兑换页）</div>
            <div class="form-row">
                <input type="text" id="redeemItemName" placeholder="奖品名称，如：免费咖啡券">
                <input type="number" id="redeemItemPoints" placeholder="所需 LYL" min="1" step="1" style="max-width:100px;">
                <input type="text" id="redeemItemIcon" placeholder="图标 (emoji)" style="max-width:80px;" value="🎁">
                <button id="addRedeemBtn" style="width:auto;white-space:nowrap;">添加奖品</button>
            </div>
            <div class="scroll-list" id="my-redeems" style="margin-top:8px;max-height:100px;"><p class="hint">尚未添加自定义兑换奖品</p></div>
        </div>

        <div id="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="js/common.js"></script>
    <script src="merchant.js"></script>
</body>
</html>
